<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Liv & Mathias Vertical Carousel</title>

  <style>
    :root {
      --bg: transparent;

      /* Card size */
      --card-width: min(82vw, 360px);
      --card-ratio: 16 / 9;

      /* Vertical carousel shape */
      --radius-y: 255px;
      --radius-z: 360px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      overscroll-behavior: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .carousel {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      perspective: 950px;
      perspective-origin: center center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--card-width);
      aspect-ratio: var(--card-ratio);
      display: block;
      overflow: hidden;
      background: #e8e8e8;
      text-decoration: none;
      color: inherit;
      transform-style: preserve-3d;
      transform-origin: center center;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      cursor: pointer;
    }

    .card video,
    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
      background: #e8e8e8;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      line-height: 1.15;
      color: #111;
      background: #d9d9d9;
      pointer-events: none;
    }

    @media (max-height: 740px) {
      :root {
        --card-width: min(78vw, 320px);
        --radius-y: 220px;
        --radius-z: 320px;
      }
    }
  </style>
</head>

<body>
  <main class="carousel" id="carousel" aria-label="Portfolio projects"></main>

  <script>
    const projects = [
      {
        title: "Hvordan vil du huskes 01",
        href: "https://livandmathias.com/hvordanvilduhuskes",
        type: "video",
        src: "assets/hvordanvilduhuskes.mp4"
      },
      {
        title: "Hvordan vil du huskes 02",
        href: "https://livandmathias.com/hvordanvilduhuskes",
        type: "video",
        src: "assets/hvordanvilduhuskes.mp4"
      },
      {
        title: "Hvordan vil du huskes 03",
        href: "https://livandmathias.com/hvordanvilduhuskes",
        type: "video",
        src: "assets/hvordanvilduhuskes.mp4"
      }
    ];

    const carousel = document.getElementById("carousel");

    const settings = {
      autoSpeed: 0.00006,
      dragPixelsPerStep: 175,
      momentumMultiplier: 0.9,
      friction: 0.94,

      /* Look */
      maxTilt: 58,
      minScale: 0.58,
      backOpacity: 0.16,
      blurAmount: 0.15
    };

    let cards = [];
    let offset = 0;
    let velocity = 0;

    let isDragging = false;
    let startY = 0;
    let lastY = 0;
    let lastTime = 0;
    let moved = false;
    let suppressClick = false;

    function getCSSNumber(name) {
      return parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue(name)
      );
    }

    function createCard(project) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = project.href;
      card.target = "_top";
      card.rel = "noopener";
      card.setAttribute("aria-label", project.title);

      if (project.type === "video") {
        const video = document.createElement("video");
        video.src = project.src;
        video.autoplay = true;
        video.muted = true;
        video.defaultMuted = true;
        video.loop = true;
        video.playsInline = true;
        video.preload = "metadata";

        video.setAttribute("muted", "");
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");

        video.addEventListener("error", () => {
          const fallback = document.createElement("div");
          fallback.className = "placeholder";
          fallback.textContent = project.title + " — video not found";
          card.appendChild(fallback);
        });

        card.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = project.src;
        img.alt = project.title;

        img.addEventListener("error", () => {
          const fallback = document.createElement("div");
          fallback.className = "placeholder";
          fallback.textContent = project.title + " — image not found";
          card.appendChild(fallback);
        });

        card.appendChild(img);
      }

      carousel.appendChild(card);
      return card;
    }

    function build() {
      cards = projects.map(createCard);
    }

    function circularDistance(value) {
      const total = cards.length;
      return ((value + total / 2) % total + total) % total - total / 2;
    }

    function playRelevantVideos() {
      cards.forEach((card, index) => {
        const video = card.querySelector("video");
        if (!video) return;

        const distance = Math.abs(circularDistance(index - offset));

        if (distance < 1.65) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      });
    }

    function unlockVideos() {
      cards.forEach((card) => {
        const video = card.querySelector("video");
        if (video) video.play().catch(() => {});
      });
    }

    function render() {
      const total = cards.length;
      const radiusY = getCSSNumber("--radius-y") || 240;
      const radiusZ = getCSSNumber("--radius-z") || 340;

      cards.forEach((card, index) => {
        const position = circularDistance(index - offset);
        const angle = position * ((Math.PI * 2) / total);

        const y = Math.sin(angle) * radiusY;
        const z = Math.cos(angle) * radiusZ;

        const frontness = (Math.cos(angle) + 1) / 2;

        const rotateX = Math.sin(angle) * settings.maxTilt;
        const scale =
          settings.minScale +
          (1 - settings.minScale) * Math.pow(frontness, 0.72);

        const opacity =
          settings.backOpacity +
          (1 - settings.backOpacity) * Math.pow(frontness, 0.9);

        const blur = (1 - frontness) * settings.blurAmount;
        const zIndex = Math.round(frontness * 1000);

        card.style.transform =
          `translate3d(-50%, calc(-50% + ${y}px), ${z - radiusZ}px) rotateX(${rotateX}deg) scale(${scale})`;

        card.style.opacity = opacity;
        card.style.filter = `blur(${blur}px)`;
        card.style.zIndex = zIndex;
      });

      playRelevantVideos();
    }

    function animate(time) {
      if (!animate.last) animate.last = time;
      const delta = Math.min(time - animate.last, 34);
      animate.last = time;

      if (!isDragging) {
        offset += settings.autoSpeed * delta;
        offset += velocity * delta;

        velocity *= Math.pow(settings.friction, delta / 16.67);
        if (Math.abs(velocity) < 0.000003) velocity = 0;
      }

      render();
      requestAnimationFrame(animate);
    }

    carousel.addEventListener("pointerdown", (event) => {
      isDragging = true;
      moved = false;
      velocity = 0;

      startY = event.clientY;
      lastY = event.clientY;
      lastTime = performance.now();

      unlockVideos();

      carousel.setPointerCapture?.(event.pointerId);
    });

    carousel.addEventListener("pointermove", (event) => {
      if (!isDragging) return;

      const now = performance.now();
      const deltaY = event.clientY - lastY;
      const deltaTime = Math.max(now - lastTime, 1);

      if (Math.abs(event.clientY - startY) > 7) {
        moved = true;
      }

      const stepDelta = deltaY / settings.dragPixelsPerStep;

      offset -= stepDelta;
      velocity = -(stepDelta / deltaTime) * settings.momentumMultiplier;

      lastY = event.clientY;
      lastTime = now;
    });

    carousel.addEventListener("pointerup", (event) => {
      isDragging = false;
      carousel.releasePointerCapture?.(event.pointerId);

      if (moved) {
        suppressClick = true;
        setTimeout(() => {
          suppressClick = false;
        }, 130);
      }
    });

    carousel.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    carousel.addEventListener(
      "click",
      (event) => {
        if (suppressClick) {
          event.preventDefault();
          event.stopPropagation();
        }
      },
      true
    );

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        cards.forEach((card) => {
          const video = card.querySelector("video");
          if (video) video.pause();
        });
      } else {
        playRelevantVideos();
      }
    });

    build();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
