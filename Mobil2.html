<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Liv & Mathias — Mobil karussel</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
  }

  #stage {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #carousel {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    transform-style: preserve-3d;
  }

  .card {
    position: absolute;
    left: 0;
    top: 0;
    display: block;
    overflow: hidden;
    background: #1a1a1a;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    cursor: pointer;
    text-decoration: none;
  }

  .card video,
  .card img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    pointer-events: none;
    background: #1a1a1a;
  }
</style>
</head>

<body>
  <main id="stage" aria-label="Portfolio projekter">
    <div id="carousel"></div>
  </main>

  <script>
  (function () {
    const stage = document.getElementById('stage');
    const carousel = document.getElementById('carousel');

    // ---------------------------------------------------------------
    // PROJEKTER — rækkefølge, orientering, fil og link
    // ---------------------------------------------------------------
    const projekter = [
      { navn: 'SAA new',            type: 'video', src: 'assets/SAA nyny.mp4',           orientering: 'landscape',     href: 'https://livandmathias.com/becomeanaddict' },
      { navn: 'Pære',                type: 'video', src: 'assets/pærenye.mp4',            orientering: 'portrait-kort', href: 'https://livandmathias.com/paeren' },
      { navn: 'FL01',                type: 'image', src: 'assets/FL01.png',               orientering: 'portrait',      href: 'https://livandmathias.com/flatlist' },
      { navn: 'XBOX',                type: 'video', src: 'assets/XBOX FINAL.mp4',         orientering: 'landscape',     href: 'https://livandmathias.com/everyscreen' },
      { navn: 'Livpic',              type: 'image', src: 'assets/livpic.png',             orientering: 'portrait-kort', href: 'https://livandmathias.com/about' },
      { navn: 'Trusser',             type: 'video', src: 'assets/trusser.mp4',            orientering: 'landscape',     href: 'https://livandmathias.com/dischargetag' },
      { navn: 'FL02',                type: 'image', src: 'assets/FL02.png',               orientering: 'portrait',      href: 'https://livandmathias.com/flatlist' },
      { navn: 'Klovn',               type: 'video', src: 'assets/KlovnNYESTE.mp4',        orientering: 'portrait-kort', href: 'https://livandmathias.com/enpausefraalvoren' },
      { navn: 'Hvordanvilduhuskes',  type: 'video', src: 'assets/hvordanvilduhuskes.mp4', orientering: 'landscape',     href: 'https://livandmathias.com/hvordanvilduhuskes' },
      { navn: 'Mathiasny',           type: 'image', src: 'assets/mathiasny.png',          orientering: 'portrait-kort', href: 'https://livandmathias.com/about' },
      { navn: 'FL03',                type: 'image', src: 'assets/FL03.png',               orientering: 'portrait',      href: 'https://livandmathias.com/flatlist' }
    ];

    const N = projekter.length;

    // ---------------------------------------------------------------
    // INDSTILLINGER — tunet sammen i prototypen
    // ---------------------------------------------------------------
    const settings = {
      perspective: 400,
      landscapeW: 230,
      portraitW: 150,
      portraitHeightFactor: 0.82,
      gapPx: 16,              // pixel-afstand fra bund af forrige kort til top af næste
      minBrightness: 0.50,    // bagsideprojekter dæmpes til denne brightness, men forbliver synlige
      autoSpeed: 0.18,        // auto-rotation hastighed (samme skala som test-prototypen)
      friction: 0.93,
      dragDivisor: 140,       // lavere = mere følsom swipe
      velocityMultiplier: 14
    };

    function dims(orientering) {
      if (orientering === 'landscape') {
        return { w: settings.landscapeW, h: settings.landscapeW * (9 / 16) };
      }
      if (orientering === 'portrait') {
        return { w: settings.portraitW, h: settings.portraitW * (16 / 9) * settings.portraitHeightFactor };
      }
      // portrait-kort
      return { w: settings.portraitW, h: settings.portraitW * (16 / 9) * settings.portraitHeightFactor * 0.72 };
    }

    // ---------------------------------------------------------------
    // BYG KORT
    // ---------------------------------------------------------------
    const cards = [];

    projekter.forEach((p) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = p.href;
      card.target = '_top';
      card.rel = 'noopener';
      card.setAttribute('aria-label', p.navn);

      if (p.type === 'video') {
        const video = document.createElement('video');
        video.src = p.src;
        video.autoplay = true;
        video.muted = true;
        video.defaultMuted = true;
        video.loop = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        card.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = p.navn;
        card.appendChild(img);
      }

      carousel.appendChild(card);
      cards.push(card);
    });

    function unlockVideos() {
      cards.forEach((card) => {
        const video = card.querySelector('video');
        if (video) video.play().catch(() => {});
      });
    }

    // ---------------------------------------------------------------
    // VINKEL-BEREGNING — kæde rundt om cylinderen, bund→top gap
    // ---------------------------------------------------------------
    let radius = 260;
    let cardAngles = [];

    function computeAngles() {
      const dimsList = projekter.map((p) => dims(p.orientering));
      const heights = dimsList.map((d) => d.h);

      const segments = heights.map((h, i) => h / 2 + settings.gapPx + heights[(i + 1) % N] / 2);
      const circumference = segments.reduce((a, b) => a + b, 0);
      radius = circumference / (Math.PI * 2);

      let acc = 0;
      cardAngles = heights.map((h, i) => {
        const center = (acc / circumference) * Math.PI * 2;
        acc += segments[i];
        return center;
      });
    }

    // ---------------------------------------------------------------
    // ROTATION STATE
    // ---------------------------------------------------------------
    let rotation = 0;
    let velocity = 0;
    let isDragging = false;
    let startY = 0, lastY = 0, lastTime = 0, moved = false;

    function norm(a) {
      a = a % (Math.PI * 2);
      if (a > Math.PI) a -= Math.PI * 2;
      if (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function render() {
      stage.style.perspective = settings.perspective + 'px';
      stage.style.perspectiveOrigin = '50% 50%';

      cards.forEach((card, i) => {
        const p = projekter[i];
        const { w, h } = dims(p.orientering);
        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.marginLeft = (-w / 2) + 'px';
        card.style.marginTop = (-h / 2) + 'px';

        const baseAngle = cardAngles[i];
        const angle = norm(baseAngle - rotation);

        const y = -Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius - radius;
        const rotateX = angle * (180 / Math.PI);

        const frontness = (Math.cos(angle) + 1) / 2;
        const brightness = settings.minBrightness + (1 - settings.minBrightness) * Math.pow(frontness, 1.2);

        card.style.transform = `translate3d(0px, ${y}px, ${z}px) rotateX(${rotateX}deg)`;
        card.style.zIndex = Math.round(frontness * 1000);
        card.style.filter = `brightness(${brightness})`;
        card.style.pointerEvents = frontness > 0.5 ? 'auto' : 'none';
        card.style.cursor = frontness > 0.5 ? 'pointer' : 'default';
      });
    }

    function getFrontIndex() {
      let best = 0, bestDist = Infinity;
      cards.forEach((c, i) => {
        const angle = Math.abs(norm(cardAngles[i] - rotation));
        if (angle < bestDist) { bestDist = angle; best = i; }
      });
      return best;
    }

    // ---------------------------------------------------------------
    // ANIMATION LOOP
    // ---------------------------------------------------------------
    function animate() {
      if (!isDragging) {
        const autoSpeed = (settings.autoSpeed / 100) * 0.001;
        rotation += autoSpeed;
        rotation += velocity;
        velocity *= settings.friction;
        if (Math.abs(velocity) < 0.00005) velocity = 0;
      }
      render();
      requestAnimationFrame(animate);
    }

    // ---------------------------------------------------------------
    // TOUCH / POINTER HANDLING
    // ---------------------------------------------------------------
    let suppressClick = false;

    stage.addEventListener('pointerdown', (e) => {
      isDragging = true;
      moved = false;
      velocity = 0;
      startY = e.clientY;
      lastY = e.clientY;
      lastTime = performance.now();
      unlockVideos();
      stage.setPointerCapture?.(e.pointerId);
    });

    stage.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const now = performance.now();
      const deltaY = e.clientY - lastY;
      const dt = Math.max(now - lastTime, 1);
      if (Math.abs(e.clientY - startY) > 6) moved = true;
      const step = deltaY / settings.dragDivisor;
      rotation += step;
      velocity = (step / dt) * settings.velocityMultiplier;
      lastY = e.clientY;
      lastTime = now;
    });

    stage.addEventListener('pointerup', (e) => {
      isDragging = false;
      stage.releasePointerCapture?.(e.pointerId);

      if (moved) {
        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 130);
        return;
      }

      // Ægte tap (ingen swipe) — naviger til det forreste projekt
      const idx = getFrontIndex();
      window.top.location.href = projekter[idx].href;
    });

    stage.addEventListener('pointercancel', () => {
      isDragging = false;
    });

    stage.addEventListener('click', (e) => {
      if (suppressClick) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    document.addEventListener('visibilitychange', () => {
      cards.forEach((card) => {
        const video = card.querySelector('video');
        if (!video) return;
        if (document.hidden) {
          video.pause();
        } else {
          video.play().catch(() => {});
        }
      });
    });

    // ---------------------------------------------------------------
    // INIT
    // ---------------------------------------------------------------
    computeAngles();
    render();
    requestAnimationFrame(animate);
  })();
  </script>
</body>
</html>
