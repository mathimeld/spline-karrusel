<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = 0.0016;
      let rotationSpeed = defaultSpeed;
      let currentRotation = karrusel.rotation.y;
      let isTouching = false;

      let lastTouchY = null;
      let touchStartY = null;
      let hasMoved = false;
      let lastTimestamp = null;
      let rawVelocity = 0;

      function dispatchTouchToCanvas(type, x, y) {
        const touch = new Touch({
          identifier: 1,
          target: canvas,
          clientX: x, clientY: y,
          pageX: x, pageY: y,
          screenX: x, screenY: y,
          radiusX: 1, radiusY: 1,
          rotationAngle: 0, force: 1
        });
        canvas.dispatchEvent(new TouchEvent(type, {
          bubbles: true, cancelable: true,
          touches: type === 'touchend' ? [] : [touch],
          targetTouches: type === 'touchend' ? [] : [touch],
          changedTouches: [touch]
        }));
      }

      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching = true;
        lastTouchY = e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        lastTimestamp = Date.now();
        rawVelocity = 0;
        hasMoved = false;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y = e.touches[0].clientY;
        const now = Date.now();
        const dt = Math.max(now - lastTimestamp, 1);
        const deltaY = y - lastTouchY;

        rawVelocity = rawVelocity * 0.6 + (deltaY / dt) * 0.08 * 0.4;
        hasMoved = Math.abs(y - touchStartY) > 6;

        lastTouchY = y;
        lastTimestamp = now;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        isTouching = false;
        const t = e.changedTouches[0];

        if (!hasMoved) {
          dispatchTouchToCanvas('touchstart', t.clientX, t.clientY);
          setTimeout(() => dispatchTouchToCanvas('touchend', t.clientX, t.clientY), 80);
        }
      }, { passive: false });

      function animate() {
        requestAnimationFrame(animate);

        if (isTouching && hasMoved) {
          rotationSpeed += (rawVelocity * 0.12 - rotationSpeed) * 0.4;
        } else {
          rotationSpeed += (defaultSpeed - rotationSpeed) * 0.035;
        }

        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
