<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = 0.0016;
      let rotationSpeed = defaultSpeed;
      let currentRotation = karrusel.rotation.y;
      let isTouching = false;

      let lastTouchY = null;
      let touchStartY = null;
      let touchStartScreenY = null;
      let hasMoved = false;
      let lastTimestamp = null;
      let rawVelocity = 0;

      const projekter = [
        { navn: 'SAA new',      url: 'https://livandmathias.com/becomeanaddict',     deg: 2 },
        { navn: 'FL01',         url: 'https://livandmathias.com/flatlist',           deg: -57 },
        { navn: 'Pære',         url: 'https://livandmathias.com/paeren',             deg: 34 },
        { navn: 'XBOX',         url: 'https://livandmathias.com/everyscreen',        deg: 90 },
        { navn: 'Livpic',       url: 'https://livandmathias.com/about',              deg: 67 },
        { navn: 'Trusser',      url: 'https://livandmathias.com/dischargetag',       deg: 19 },
        { navn: 'FL02',         url: 'https://livandmathias.com/flatlist',           deg: -12 },
        { navn: 'FL03',         url: 'https://livandmathias.com/flatlist',           deg: -40 },
        { navn: 'Mathiasny',    url: 'https://livandmathias.com/about',              deg: -81 },
        { navn: 'Klovn',        url: 'https://livandmathias.com/enpausefraalvoren',  deg: -31 },
        { navn: 'Duo til port', url: 'https://livandmathias.com/lovelingo',          deg: -64 },
      ].map(p => ({ ...p, rad: p.deg * (Math.PI / 180) }));

      // Sorter projekter efter vinkel så vi kan finde naboer
      const sorteret = [...projekter].sort((a, b) => a.rad - b.rad);

      function getNaermeste(rotation, offset = 0) {
        let norm = rotation % (Math.PI * 2);
        if (norm > Math.PI) norm -= Math.PI * 2;
        if (norm < -Math.PI) norm += Math.PI * 2;

        // Find index på nærmeste projekt
        let mindsteAfstand = Infinity;
        let naermestIndex = 0;

        for (let i = 0; i < sorteret.length; i++) {
          let diff = norm - sorteret[i].rad;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const afstand = Math.abs(diff);
          if (afstand < mindsteAfstand) {
            mindsteAfstand = afstand;
            naermestIndex = i;
          }
        }

        // Offset: -1 = én foran, 0 = midten, +1 = én bagved
        const index = (naermestIndex + offset + sorteret.length) % sorteret.length;
        return sorteret[index];
      }

      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching = true;
        lastTouchY = e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        touchStartScreenY = e.touches[0].clientY;
        lastTimestamp = Date.now();
        rawVelocity = 0;
        hasMoved = false;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y = e.touches[0].clientY;
        const now = Date.now();
        const dt = Math.max(now - lastTimestamp, 1);
        const deltaY = y - lastTouchY;

        rawVelocity = rawVelocity * 0.6 + (deltaY / dt) * 0.08 * 0.4;
        hasMoved = Math.abs(y - touchStartY) > 6;

        lastTouchY = y;
        lastTimestamp = now;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        isTouching = false;

        if (!hasMoved) {
          const screenHeight = window.innerHeight;
          const tapY = touchStartScreenY;
          const tredjedel = screenHeight / 3;

          let offset = 0;
          if (tapY < tredjedel) {
            offset = -1; // Øverste zone → projekt foran
          } else if (tapY > tredjedel * 2) {
            offset = 1;  // Nederste zone → projekt bagved
          }

          const projekt = getNaermeste(currentRotation, offset);
          if (projekt) {
            window.top.location.href = projekt.url;
          }
        }
      }, { passive: false });

      function animate() {
        requestAnimationFrame(animate);

        if (isTouching && hasMoved) {
          rotationSpeed += (rawVelocity * 0.12 - rotationSpeed) * 0.4;
        } else {
          rotationSpeed += (defaultSpeed - rotationSpeed) * 0.035;
        }

        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
