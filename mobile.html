<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; touch-action: none; }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = -0.0008;
      const maxSpeed = 0.012;
      let rotationSpeed = defaultSpeed;
      let targetSpeed = defaultSpeed;
      let currentRotation = karrusel.rotation.y;

      let lastTouchX = null;
      let lastTouchY = null;
      let touchVelocity = 0;
      let isTouching = false;
      let isOurSwipe = null;

      canvas.addEventListener('touchstart', (e) => {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        isTouching = true;
        touchVelocity = 0;
        isOurSwipe = null;
      }, { passive: false, capture: true });

      canvas.addEventListener('touchmove', (e) => {
        if (!isTouching) return;

        const x = e.touches[0].clientX;
        const y = e.touches[0].clientY;
        const deltaX = x - lastTouchX;
        const deltaY = y - lastTouchY;

        if (isOurSwipe === null) {
          if (Math.abs(deltaY) > Math.abs(deltaX) + 3) {
            isOurSwipe = true;
          } else if (Math.abs(deltaX) > Math.abs(deltaY) + 3) {
            isOurSwipe = false;
          }
        }

        if (isOurSwipe === true) {
          e.preventDefault();
          e.stopPropagation();
          touchVelocity = deltaY;
          targetSpeed = (deltaY / canvas.offsetHeight) * -maxSpeed * 80;
        }

        lastTouchX = x;
        lastTouchY = y;
      }, { passive: false, capture: true });

      canvas.addEventListener('touchend', (e) => {
        if (!isTouching) return;
        isTouching = false;

        if (isOurSwipe === true) {
          e.preventDefault();
          e.stopPropagation();
          targetSpeed = touchVelocity * -0.003;
          setTimeout(() => { targetSpeed = defaultSpeed; }, 800);
        }

        isOurSwipe = null;
      }, { passive: false, capture: true });

      function animate() {
        requestAnimationFrame(animate);
        rotationSpeed += (targetSpeed - rotationSpeed) * 0.05;
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }
      animate();
    }

    init();
  </script>
</body>
</html>
