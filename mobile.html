<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = 0.0008;
      const maxSpeed = 0.04;        // Højere max hastighed
      const momentumDecay = 0.97;   // Hvor længe momentum holder (0.99 = længe, 0.90 = kort)
      let rotationSpeed = defaultSpeed;
      let targetSpeed = defaultSpeed;
      let momentum = 0;
      let currentRotation = karrusel.rotation.y;

      let lastTouchY = null;
      let touchVelocity = 0;
      let touchStartY = null;
      let touchStartTime = null;
      let hasMoved = false;

      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        lastTouchY = e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
        touchVelocity = 0;
        momentum = 0;
        hasMoved = false;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y = e.touches[0].clientY;
        const deltaY = y - lastTouchY;

        // Byg hastighed op baseret på hvor hurtigt fingeren bevæger sig
        touchVelocity = deltaY;

        // Tillad momentum-opbygning – jo flere swipes, jo mere fart
        momentum += deltaY * 0.003;
        momentum = Math.max(-maxSpeed, Math.min(maxSpeed, momentum)); // clamp

        targetSpeed = momentum;
        hasMoved = Math.abs(y - touchStartY) > 8;
        lastTouchY = y;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();

        // Hvis fingeren næsten ikke bevægede sig = klik på projekt
        if (!hasMoved) {
          const touch = e.changedTouches[0];
          touchLayer.style.pointerEvents = 'none';
          const el = document.elementFromPoint(touch.clientX, touch.clientY);
          if (el) el.click();
          setTimeout(() => { touchLayer.style.pointerEvents = 'auto'; }, 300);
          return;
        }

        // Bevar momentum og lad det fade ud
        targetSpeed = momentum;
        momentum = 0;

        // Gradvist tilbage til default
        const fadeInterval = setInterval(() => {
          targetSpeed *= momentumDecay;
          if (Math.abs(targetSpeed - defaultSpeed) < 0.0002) {
            targetSpeed = defaultSpeed;
            clearInterval(fadeInterval);
          }
        }, 16);

      }, { passive: false });

      function animate() {
        requestAnimationFrame(animate);
        rotationSpeed += (targetSpeed - rotationSpeed) * 0.12;
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }
      animate();
    }

    init();
  </script>
</body>
</html>
