<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');

      const projekter = [
        { navn: 'SAA new',         url: 'https://livandmathias.com/becomeanaddict',     deg: 2   },
        { navn: 'FL01',            url: 'https://livandmathias.com/flatlist',           deg: -57 },
        { navn: 'Pære',            url: 'https://livandmathias.com/paeren',             deg: 34  },
        { navn: 'XBOX',            url: 'https://livandmathias.com/everyscreen',        deg: 90  },
        { navn: 'Livpic',          url: 'https://livandmathias.com/about',              deg: 67  },
        { navn: 'Trusser',         url: 'https://livandmathias.com/dischargetag',       deg: 19  },
        { navn: 'FL02',            url: 'https://livandmathias.com/flatlist',           deg: -12 },
        { navn: 'FL03',            url: 'https://livandmathias.com/flatlist',           deg: -40 },
        { navn: 'Mathiasny',       url: 'https://livandmathias.com/about',              deg: -81 },
        { navn: 'Klovn',           url: 'https://livandmathias.com/enpausefraalvoren',  deg: -31 },
        { navn: 'Hvordanvilduhuskes', url: 'https://livandmathias.com/hvordanvilduhuskes', deg: -64 },
      ].map(p => ({ ...p, rad: p.deg * (Math.PI / 180) }));

      // --- Rotation state ---
      let currentRotation = karrusel.rotation.y;
      let velocity        = 0;
      const friction      = 0.92;
      const snapStrength  = 0.08;
      const snapThreshold = 0.004;
      const defaultDrift  = 0.0016;
      let isSnapping      = false;
      let snapTarget      = null;

      // --- Touch state ---
      let isTouching    = false;
      let lastTouchY    = null;
      let touchStartY   = null;
      let hasMoved      = false;
      let lastTimestamp = null;
      // Forhindrer snap i at køre i det frame fingeren lander
      let touchEndedAt  = -Infinity;

      // --- Hjælpefunktioner ---
      function normAngle(a) {
        a = a % (Math.PI * 2);
        if (a >  Math.PI) a -= Math.PI * 2;
        if (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      function angleDiff(a, b) {
        return normAngle(a - b);
      }

      // Det forreste projekt = det hvis vinkel er tættest på currentRotation
      // (dvs. mindste forskel mellem projektets absolutte vinkel og den aktuelle rotation)
      function getForreste() {
        const norm = normAngle(currentRotation);
        let mindsteAfstand = Infinity;
        let forreste = projekter[0];
        for (const p of projekter) {
          const afstand = Math.abs(angleDiff(p.rad, norm));
          if (afstand < mindsteAfstand) {
            mindsteAfstand = afstand;
            forreste = p;
          }
        }
        return forreste;
      }

      // --- Touch events ---
      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching    = true;
        isSnapping    = false;
        snapTarget    = null;
        velocity      = 0;
        lastTouchY    = e.touches[0].clientY;
        touchStartY   = e.touches[0].clientY;
        lastTimestamp = Date.now();
        hasMoved      = false;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y   = e.touches[0].clientY;
        const now = Date.now();
        const dt  = Math.max(now - lastTimestamp, 1);
        const deltaY = y - lastTouchY;

        // Direkte og lineær — ingen dobbelt-dæmpning
        velocity = (deltaY / dt) * 0.3;
        currentRotation += velocity;
        karrusel.rotation.y = currentRotation;

        hasMoved      = Math.abs(y - touchStartY) > 8;
        lastTouchY    = y;
        lastTimestamp = now;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        isTouching   = false;
        touchEndedAt = Date.now();

        if (!hasMoved) {
          // Ægte tap — åbn det forreste projekt
          const projekt = getForreste();
          window.top.location.href = projekt.url;
          return;
        }

        // Swipe afsluttet — momentum og snap tager over i animate()
      }, { passive: false });

      // --- Animation loop ---
      function animate() {
        requestAnimationFrame(animate);

        if (isTouching) return;

        // Vent 1 frame efter touch-end før vi vurderer snap,
        // så velocity fra det sidste touchmove er korrekt sat
        const msSidensidsteTouchEnd = Date.now() - touchEndedAt;
        if (msSidensidsteTouchEnd < 16) return;

        if (isSnapping && snapTarget !== null) {
          // Snap mod nærmeste projekt
          const diff = angleDiff(snapTarget.rad, normAngle(currentRotation));
          currentRotation += diff * snapStrength;
          if (Math.abs(diff) < 0.001) {
            currentRotation = currentRotation - normAngle(currentRotation) + snapTarget.rad;
            isSnapping = false;
            snapTarget = null;
            velocity   = 0;
          }
        } else if (Math.abs(velocity) > snapThreshold) {
          // Momentum kører stadig
          velocity *= friction;
          currentRotation += velocity;
        } else if (Math.abs(velocity) > 0.0001) {
          // Velocity lav nok — find nærmeste og snap
          snapTarget = getForreste();
          isSnapping = true;
          velocity   = 0;
        } else {
          // Ingen aktiv bevægelse — auto-drift
          velocity = 0;
          currentRotation += defaultDrift;
        }

        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
