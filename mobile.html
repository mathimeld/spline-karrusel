<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = -0.0008;
      const maxSpeed = 0.012;
      let rotationSpeed = defaultSpeed;
      let targetSpeed = defaultSpeed;
      let currentRotation = karrusel.rotation.y;

      let lastTouchY = null;
      let touchVelocity = 0;

      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        lastTouchY = e.touches[0].clientY;
        touchVelocity = 0;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y = e.touches[0].clientY;
        const deltaY = y - lastTouchY;
        touchVelocity = deltaY;
        targetSpeed = (deltaY / canvas.offsetHeight) * -maxSpeed * 80;
        lastTouchY = y;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        targetSpeed = touchVelocity * -0.003;
        setTimeout(() => { targetSpeed = defaultSpeed; }, 800);
      }, { passive: false });

      function animate() {
        requestAnimationFrame(animate);
        rotationSpeed += (targetSpeed - rotationSpeed) * 0.05;
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }
      animate();
    }

    init();
  </script>
</body>
</html>
