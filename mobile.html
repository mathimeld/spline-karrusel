<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');

      // Viewport: iPhone 14 & 15 Pro = 393 x 852px
      // Karussellen fylder skærmhøjden. Vi estimerer radius til halvdelen.
      // hitRadius = hvor mange radianer et projekt "fylder" på cirklen.
      // Med ~4-5 projekter synlige ad gangen og 2π fordelt på 11 projekter
      // giver ~0.57 rad per projekt — vi bruger 0.22 som hit-zone (lidt under halvdelen)
      // så der er et tydeligt mellemrum / dead zone mellem projekterne.
      const HIT_RADIUS = 0.22; // radianer — juster op/ned efter test

      const projekter = [
        { navn: 'SAA new',      url: 'https://livandmathias.com/becomeanaddict',    deg: 2   },
        { navn: 'FL01',         url: 'https://livandmathias.com/flatlist',          deg: -57 },
        { navn: 'Pære',         url: 'https://livandmathias.com/paeren',            deg: 34  },
        { navn: 'XBOX',         url: 'https://livandmathias.com/everyscreen',       deg: 90  },
        { navn: 'Livpic',       url: 'https://livandmathias.com/about',             deg: 67  },
        { navn: 'Trusser',      url: 'https://livandmathias.com/dischargetag',      deg: 19  },
        { navn: 'FL02',         url: 'https://livandmathias.com/flatlist',          deg: -12 },
        { navn: 'FL03',         url: 'https://livandmathias.com/flatlist',          deg: -40 },
        { navn: 'Mathiasny',    url: 'https://livandmathias.com/about',             deg: -81 },
        { navn: 'Klovn',        url: 'https://livandmathias.com/enpausefraalvoren', deg: -31 },
        { navn: 'Hvordanvild',  url: 'https://livandmathias.com/hvordanvilduhuskes',deg: -64 },
      ].map(p => ({ ...p, rad: p.deg * (Math.PI / 180) }));

      // --- Rotation state ---
      let currentRotation = karrusel.rotation.y;
      let velocity = 0;
      const friction      = 0.92;
      const snapStrength  = 0.08;
      const snapThreshold = 0.004;
      const defaultDrift  = 0.0016;  // Auto-rotation — altid aktiv
      let isSnapping  = false;
      let snapTarget  = null;

      // --- Touch state ---
      let isTouching   = false;
      let lastTouchY   = null;
      let touchStartY  = null;
      let hasMoved     = false;
      let lastTimestamp = null;

      // --- Hjælpefunktioner ---
      function normAngle(a) {
        a = a % (Math.PI * 2);
        if (a > Math.PI)  a -= Math.PI * 2;
        if (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      function angleDiff(a, b) {
        return normAngle(a - b);
      }

      // Er projektet på forsiden? cos > 0 = forside, cos < 0 = bagside
      function erPaaForside(projektRad) {
        const relativ = normAngle(projektRad - normAngle(currentRotation));
        return Math.cos(relativ) > 0;
      }

      // Find nærmeste FORSIDE-projekt til en given rotation (bruges til snap)
      function getNaermeste(rotation) {
        const norm = normAngle(rotation);
        let mindsteAfstand = Infinity;
        let naermest = null;
        for (const p of projekter) {
          if (!erPaaForside(p.rad)) continue;
          const afstand = Math.abs(angleDiff(norm, p.rad));
          if (afstand < mindsteAfstand) {
            mindsteAfstand = afstand;
            naermest = p;
          }
        }
        // Fallback hvis ingen forside-projekter (bør ikke ske)
        return naermest || projekter[0];
      }

      // Find projekt baseret på tap-Y.
      // Mapper tap-Y til en vinkel på cirklen og finder det forside-projekt
      // hvis vinkel er inden for HIT_RADIUS — ellers ingen navigation (dead zone).
      function getProjektFraTapY(tapY) {
        const screenH = window.innerHeight;
        // Normaliser til [-1, 1]
        const normY = (tapY / screenH) * 2 - 1;
        const clamped = Math.max(-1, Math.min(1, normY));
        // Vinkel på cirklen der svarer til dette Y-punkt
        const tapAngle = Math.asin(clamped);

        let bedsteAfstand = Infinity;
        let bedsteProjekt = null;

        for (const p of projekter) {
          // Spring bagside-projekter over
          if (!erPaaForside(p.rad)) continue;

          // Projektets effektive vinkel relativt til currentRotation
          const relativ = normAngle(p.rad - normAngle(currentRotation));
          const afstand = Math.abs(angleDiff(relativ, tapAngle));

          if (afstand < HIT_RADIUS && afstand < bedsteAfstand) {
            bedsteAfstand = afstand;
            bedsteProjekt = p;
          }
        }

        return bedsteProjekt; // null = dead zone, ingen navigation
      }

      // --- Touch events ---
      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching  = true;
        isSnapping  = false;
        lastTouchY  = e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        lastTimestamp = Date.now();
        velocity    = 0;
        hasMoved    = false;
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const y   = e.touches[0].clientY;
        const now = Date.now();
        const dt  = Math.max(now - lastTimestamp, 1);
        const deltaY = y - lastTouchY;

        velocity = (deltaY / dt) * 0.3;
        currentRotation += velocity;
        karrusel.rotation.y = currentRotation;

        hasMoved = Math.abs(y - touchStartY) > 8;
        lastTouchY    = y;
        lastTimestamp = now;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        isTouching = false;

        if (!hasMoved) {
          const tapY = e.changedTouches[0].clientY;
          const projekt = getProjektFraTapY(tapY);
          if (projekt) {
            window.top.location.href = projekt.url;
          }
          // Ingen projekt fundet = dead zone, gør ingenting
          return;
        }

        // Swipe sluppet — lad momentum og snap tage over
        isSnapping = false;
      }, { passive: false });

      // --- Animation loop ---
      function animate() {
        requestAnimationFrame(animate);

        if (isTouching) return;

        if (isSnapping && snapTarget !== null) {
          const diff = angleDiff(snapTarget.rad, normAngle(currentRotation));
          currentRotation += diff * snapStrength;
          if (Math.abs(diff) < 0.001) {
            currentRotation = currentRotation - normAngle(currentRotation) + snapTarget.rad;
            isSnapping  = false;
            snapTarget  = null;
            velocity    = 0;
          }
        } else if (Math.abs(velocity) > snapThreshold) {
          // Momentum
          velocity *= friction;
          currentRotation += velocity;
        } else if (Math.abs(velocity) > 0.0001) {
          // Velocity lav nok — snap til nærmeste forside-projekt
          snapTarget = getNaermeste(currentRotation);
          isSnapping = true;
          velocity   = 0;
        } else {
          // Ingen swipe aktiv — auto-drift
          velocity = 0;
          currentRotation += defaultDrift;
        }

        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
