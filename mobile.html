<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
    #touch-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>
  <div id="touch-layer"></div>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const touchLayer = document.getElementById('touch-layer');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/x0M6hgPubJwaAiWo/scene.splinecode');

      setTimeout(() => {
        canvas.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: canvas.offsetWidth / 2,
          clientY: canvas.offsetHeight / 2
        }));
      }, 500);

      app.addEventListener('start', () => {
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.play().catch(() => {});
        });
      });

      const karrusel = app.findObjectByName('Group 2');
      const defaultSpeed = 0.0016;  // Dobbelt op
      let rotationSpeed = defaultSpeed;
      let currentRotation = karrusel.rotation.y;
      let fadeInterval = null;

      let lastTouchY = null;
      let touchStartY = null;
      let touchStartX = null;
      let velocity = 0;
      let hasMoved = false;
      let lastTimestamp = null;

      function dispatchTouchToCanvas(type, x, y) {
        const touch = new Touch({
          identifier: 1,
          target: canvas,
          clientX: x,
          clientY: y,
          pageX: x,
          pageY: y,
          screenX: x,
          screenY: y,
          radiusX: 1,
          radiusY: 1,
          rotationAngle: 0,
          force: 1
        });
        const event = new TouchEvent(type, {
          bubbles: true,
          cancelable: true,
          touches: type === 'touchend' ? [] : [touch],
          targetTouches: type === 'touchend' ? [] : [touch],
          changedTouches: [touch]
        });
        canvas.dispatchEvent(event);
      }

      touchLayer.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        lastTouchY = t.clientY;
        touchStartY = t.clientY;
        touchStartX = t.clientX;
        lastTimestamp = Date.now();
        velocity = 0;
        hasMoved = false;

        // Stop evt. igangværende fade når nyt swipe starter
        if (fadeInterval) {
          clearInterval(fadeInterval);
          fadeInterval = null;
        }
      }, { passive: false });

      touchLayer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const now = Date.now();
        const dt = Math.max(now - lastTimestamp, 1);
        const deltaY = t.clientY - lastTouchY;

        velocity = deltaY / dt;
        hasMoved = Math.abs(t.clientY - touchStartY) > 6;

        // Blend ny velocity ind i eksisterende speed for smooth overgang ved flere swipes
        rotationSpeed = rotationSpeed * 0.3 + velocity * 0.08 * 0.7;

        lastTouchY = t.clientY;
        lastTimestamp = now;
      }, { passive: false });

      touchLayer.addEventListener('touchend', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];

        if (!hasMoved) {
          dispatchTouchToCanvas('touchstart', t.clientX, t.clientY);
          setTimeout(() => {
            dispatchTouchToCanvas('touchend', t.clientX, t.clientY);
          }, 80);
          return;
        }

        // Fade gradvist tilbage til default – uden hak
        fadeInterval = setInterval(() => {
          const diff = rotationSpeed - defaultSpeed;
          if (Math.abs(diff) < 0.00005) {
            rotationSpeed = defaultSpeed;
            clearInterval(fadeInterval);
            fadeInterval = null;
          } else {
            rotationSpeed -= diff * 0.04;
          }
        }, 16);

      }, { passive: false });

      function animate() {
        requestAnimationFrame(animate);
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }
      animate();
    }

    init();
  </script>
</body>
</html>
