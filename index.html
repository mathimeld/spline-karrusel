<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const app = new Application(canvas);

      await app.load('https://draft.spline.design/h0Japt0EqHImtwP5/scene.splinecode');

      const karrusel = app.findObjectByName('Group 2');

      let rotationSpeed = 0;
      let currentRotation = karrusel.rotation.y;

      document.addEventListener('mousemove', (e) => {
        const centerX = window.innerWidth / 2;
        const distance = (e.clientX - centerX) / centerX;
        rotationSpeed = distance * 0.03;
      });

      function animate() {
        requestAnimationFrame(animate);
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
