<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <canvas id="spline-canvas"></canvas>

  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    async function init() {
      const canvas = document.getElementById('spline-canvas');
      const app = new Application(canvas);

      await app.load('https://prod.spline.design/g4VepyPEZWRZX1Vr/scene.splinecode');

      const karrusel = app.findObjectByName('Group 2');

      let rotationSpeed = 0.01; // default hastighed når musen ikke hover
      let isHovering = false;
      let currentRotation = karrusel.rotation.y;

      canvas.addEventListener('mouseenter', () => {
        isHovering = true;
      });

      canvas.addEventListener('mouseleave', () => {
        isHovering = false;
        rotationSpeed = 0.01; // fortsæt med default hastighed når musen forlader
      });

      canvas.addEventListener('mousemove', (e) => {
        if (!isHovering) return;
        const centerX = canvas.offsetWidth / 2;
        const distance = (e.clientX - centerX) / centerX; // -1 til 1
        rotationSpeed = distance * -0.03; // negativ = mod uret, positiv = med uret
      });

      function animate() {
        requestAnimationFrame(animate);
        currentRotation += rotationSpeed;
        karrusel.rotation.y = currentRotation;
      }

      animate();
    }

    init();
  </script>
</body>
</html>
